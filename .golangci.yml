run:
  timeout: 5m

linters:
  disable-all: true
  enable:
    - govet
    - errcheck
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - typecheck

linters-settings:
  typecheck:
    whole-program: true

issues:
  exclude:
    - "undefined: validator"
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0