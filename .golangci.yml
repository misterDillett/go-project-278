version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - govet
    - errcheck
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - typecheck

issues:
  exclude:
    - "undefined: validator"
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0